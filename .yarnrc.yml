enableGlobalCache: true

# Require explicit `workspace:` protocol for local linking.
# Dependencies using plain semver or `npm:` resolve from the registry,
# so normal CLI builds consume the published core. Developers who want
# to iterate on core + CLI together can `yarn link` manually.
enableTransparentWorkspaces: false

nodeLinker: node-modules

npmRegistryServer: "https://registry.yarnpkg.com"
