name: Release

on:
  push:
    tags:
      - "release-siren/core@*"

permissions:
  contents: write # needed to create git tags for published packages

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history to compare versions

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build core
        run: yarn workspace @sirenpm/core build

      - name: Publish changed packages
        run: yarn changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
