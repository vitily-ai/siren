name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: CLI smoke test
        run: node ./apps/cli/dist/index.js --version

      - name: Test
        run: yarn test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint || echo "Linting not configured yet"

  grammar-drift:
    name: Grammar drift check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check grammar artifact freshness
        shell: bash
        run: |
          set -euo pipefail

          GRAMMAR=packages/language/grammar/grammar.js
          WASM=packages/language/grammar/tree-sitter-siren.wasm

          if [ ! -f "$GRAMMAR" ]; then
            echo "::error file=$GRAMMAR::Grammar source missing"; exit 1
          fi
          if [ ! -f "$WASM" ]; then
            echo "::error file=$WASM::Compiled WASM missing — run 'yarn workspace @sirenpm/language grammar:build-wasm' and commit"; exit 1
          fi

          GRAMMAR_TS=$(git log -1 --format=%ct -- "$GRAMMAR")
          WASM_TS=$(git log -1 --format=%ct -- "$WASM")

          if [ -z "$GRAMMAR_TS" ] || [ -z "$WASM_TS" ]; then
            echo "::error::Could not determine last-commit timestamp for grammar or WASM. Is this a shallow clone? Ensure fetch-depth: 0."
            exit 1
          fi

          if [ "$GRAMMAR_TS" -gt "$WASM_TS" ]; then
            GRAMMAR_DATE=$(git log -1 --format=%ci -- "$GRAMMAR")
            WASM_DATE=$(git log -1 --format=%ci -- "$WASM")
            echo "::error file=$GRAMMAR::grammar.js (last commit $GRAMMAR_DATE) is newer than tree-sitter-siren.wasm (last commit $WASM_DATE). Regenerate with 'yarn workspace @sirenpm/language grammar:build-wasm' and commit in the same PR."
            exit 1
          fi

          echo "Grammar artifact is up to date."
          echo "  grammar.js last commit:  $(git log -1 --format=%ci -- "$GRAMMAR")"
          echo "  WASM      last commit:  $(git log -1 --format=%ci -- "$WASM")"

  integration:
    name: Integration (linked workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, lint, grammar-drift]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Swap @sirenpm/* deps to workspace protocol
        run: bash .github/workflow-utils/swap-to-workspace-protocol.sh

      # `--immutable` is intentionally omitted: the swap above mutates
      # package.json, so the lockfile will diverge. The integration job
      # discards the regenerated lockfile.
      - name: Install dependencies (linked)
        run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Build (linked)
        run: yarn build

      - name: CLI smoke test (linked)
        run: node ./apps/cli/dist/index.js --version

      - name: Test (linked)
        run: yarn test

      - name: Failure hint
        if: failure()
        run: |
          echo "::warning::The integration job links @sirenpm/* deps via the workspace protocol to detect breaking changes between sibling packages. If a failure here is unexpected and the unlinked 'test' job passed, double-check that yarn.lock is fresh on main — a stale root lockfile can occasionally surface here even when the underlying code is fine."
