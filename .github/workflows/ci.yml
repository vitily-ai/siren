name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build
      
      - name: Type Check
        run: yarn typecheck

      - name: CLI smoke test
        run: node ./apps/cli/dist/index.js --version

      - name: Test
        run: yarn test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint || echo "Linting not configured yet"

  grammar-drift:
    name: Grammar drift check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check grammar artifact freshness
        shell: bash
        run: |
          set -euo pipefail

          GRAMMAR=packages/language/src/grammar/grammar.js
          WASM=packages/language/src/grammar/tree-sitter-siren.wasm

          if [ ! -f "$GRAMMAR" ]; then
            echo "::error file=$GRAMMAR::Grammar source missing"; exit 1
          fi
          if [ ! -f "$WASM" ]; then
            echo "::error file=$WASM::Compiled WASM missing — run 'yarn workspace @sirenpm/language grammar:build-wasm' and commit"; exit 1
          fi

          GRAMMAR_TS=$(git log -1 --format=%ct -- "$GRAMMAR")
          WASM_TS=$(git log -1 --format=%ct -- "$WASM")

          if [ -z "$GRAMMAR_TS" ] || [ -z "$WASM_TS" ]; then
            echo "::error::Could not determine last-commit timestamp for grammar or WASM. Is this a shallow clone? Ensure fetch-depth: 0."
            exit 1
          fi

          if [ "$GRAMMAR_TS" -gt "$WASM_TS" ]; then
            GRAMMAR_DATE=$(git log -1 --format=%ci -- "$GRAMMAR")
            WASM_DATE=$(git log -1 --format=%ci -- "$WASM")
            echo "::error file=$GRAMMAR::grammar.js (last commit $GRAMMAR_DATE) is newer than tree-sitter-siren.wasm (last commit $WASM_DATE). Regenerate with 'yarn workspace @sirenpm/grammar build' and commit in the same PR."
            exit 1
          fi

          echo "Grammar artifact is up to date."
          echo "  grammar.js last commit:  $(git log -1 --format=%ci -- "$GRAMMAR")"
          echo "  WASM      last commit:  $(git log -1 --format=%ci -- "$WASM")"

  detect-changed-packages:
    name: Detect changed @sirenpm/* packages
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Determine what to compare against
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            # push to main — fall back to previous commit
            BASE="${{ github.event.before }}"
            if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
              BASE="HEAD~1"
            fi
          fi

          # Get changed files; fall back to last commit if diff fails
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)

          # Map file paths to @sirenpm/* package names, excluding core
          PACKAGES=$(echo "$CHANGED" | while IFS= read -r file; do
            case "$file" in
              packages/language/*)  echo "@sirenpm/language" ;;
              apps/cli/*)          echo "@sirenpm/cli"  ;;
            esac
          done | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "matrix=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "Changed packages: $PACKAGES"

  post-pack-validation:
    name: Post-pack validation (${{ matrix.package }})
    if: ${{ needs.detect-changed-packages.outputs.matrix != '[]' && needs.detect-changed-packages.outputs.matrix != '' }}
    needs: [test, lint, grammar-drift, detect-changed-packages]
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changed-packages.outputs.matrix) }}
    uses: ./.github/workflows/post-pack-validation.yml
    with:
      target-package: ${{ matrix.package }}
      fail-on-error: false
